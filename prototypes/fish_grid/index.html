<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Grid - Toyosu Tuna 2023</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="fishCanvas"></canvas>
    <div class="info">
        <p id="zoomInfo">Zoom: 1.0x</p>
        <div class="controls">
            <div class="button-row">
                <button id="playButton" type="button">Play</button>
                <button id="resetButton" type="button">Reset</button>
            </div>
            <label for="manualZoom">Manual Zoom</label>
            <input id="manualZoom" type="range" min="0.05" max="13" step="0.001" value="1">
            <p id="manualZoomValue">1.0x</p>
            <label for="zoomOutSpeed">Zoom Out Speed</label>
            <input id="zoomOutSpeed" type="range" min="0.2" max="4" step="0.1" value="1.6">
            <p id="zoomOutSpeedValue">1.6x</p>
            <label class="checkbox-row" for="stopAtZoomEnabled">
                <input id="stopAtZoomEnabled" type="checkbox" checked>
                Stop zoom-out at target
            </label>
            <label for="stopAtZoomPreset">Target zoom-out stop</label>
            <select id="stopAtZoomPreset">
                <option value="custom">Custom</option>
                <option value="0.10">Year (.11x)</option>
                <option value="0.95">Week (.95x)</option>
                <option value="0.8">Pixel (.80x)</option>
                <option value="1">Grid (1.00x)</option>
            </select>
            <input id="stopAtZoomLevel" type="number" min="0.05" max="10" step="0.01" value="0.80">
            <p id="stopAtZoomLevelValue">0.80x</p>
            <label class="checkbox-row" for="showScaleBar">
                <input id="showScaleBar" type="checkbox" checked>
                Show fish scale bar
            </label>
            <label class="checkbox-row" for="showCenterBox">
                <input id="showCenterBox" type="checkbox" checked>
                Show center box
            </label>
            <label class="checkbox-row" for="showCenterReticle">
                <input id="showCenterReticle" type="checkbox" checked>
                Show center reticle
            </label>
            <label class="checkbox-row" for="usePixelMode">
                <input id="usePixelMode" type="checkbox" checked>
                Pixel mode when zoomed out
            </label>
            <label class="checkbox-row" for="useGridLayout">
                <input id="useGridLayout" type="checkbox">
                Grid layout
            </label>
            <label class="checkbox-row" for="invisibleYearLayout">
                <input id="invisibleYearLayout" type="checkbox">
                Invisible year ring layout
            </label>
            <button id="playYearAnimationButton" type="button">Play Year Animation</button>
            <label class="checkbox-row" for="invisibleWeekLayout">
                <input id="invisibleWeekLayout" type="checkbox">
                Invisible week ring layout
            </label>
            <button id="playWeekAnimationButton" type="button">Play Week Animation</button>
            <div class="section-divider"></div>
            <p class="section-title">Background</p>
            <div class="button-row">
                <button id="bgGradientButton" type="button" class="bg-option active">Gradient</button>
                <button id="bgImageButton" type="button" class="bg-option">Image</button>
                <button id="bgVideoButton" type="button" class="bg-option">Video</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
